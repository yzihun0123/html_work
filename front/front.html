<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/front.css">
  <title>Document</title>
</head>
<body>
  <div class="container">
    <h1>프런트엔드 개발자 지원서</h1>
    <p>HTML, CSS, Javascript에 대한 기술적 이해와 경험이 있는 분을 찾습니다.</p>
    <fieldset>
      <label for="personal"><h4>개인정보</h4></label>
        <ul>
          </li>
          <li>
            <label for="name">이름</label>
            <input type="name" 
            name="name" 
            id="name" 
            placeholder="공백없이 입력하세요"/>
          </li>
          <li>
            <label for="tel">연락처</label>
            <input type="tel" name="tel" id="tel">
          </li>
          </li>
        </ul>
        <ul>
          <li>
             <label for="area"><h4>지원분야</h4></label>
          <li>          
            <input type="radio" name="publish" id="publish_yes" value="yes">
            <label for="publish_yes">웹 퍼블리싱</label>
          </li>
          <li>
           <input type="radio" name="develop" id="develop_yes" value="yes">
            <label for="develop_yes">웹 애플리케이션 개발</label>
          </li>
          <li>
           <input type="radio" name="improve" id="improve_yes" value="yes">
           <label for="improve_yes">개발 환경 개선</label>
          </li>
        </ul>
        </li>
        <ul>
        <li>
          <label for="content"><h4>지원동기</h4></label>
        </li>
          <li>
          <textarea name="memo" id="memo" cols="40" rows="10" placeholder="본사 지원 동기를 간략히 써 주세요"></textarea>
        </li>
        </ul>
      </ul>
        <div class="buttons">
        <input type="submit" value="접수하기">
        <input type="reset" value="다시쓰기">
      </div>
    </fieldset>
  </div>
</body>
</html>
