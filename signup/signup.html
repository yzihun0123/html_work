<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입</title>
  </head>
  <body>
    <div class="container">
      <h1>회원 가입을 환영합니다</h1>
      <form action="" method="get">
        <fieldset>
          <legend>사용자정보</legend>
          <ul>
            <li>
              <label for="uid">아이디</label>
              <input
                type="text"
                id="uid"
                name="uid"
                required
                placeholder="4자 ~ 10자 사이, 공백없이"
                autofocus
              />
            </li>
            <li>
              <label for="email">이메일</label>
              <input type="email" name="email" id="email" />
            </li>
            <li>
              <label for="pwd">비밀번호</label>
              <input
                type="password"
                name="pwd"
                id="pwd"
                placeholder="문자와 숫자, 특수 기호 포함 8자 이상"
              />
              <li>
                <label for="confirm">비밀번호 확인</label>
                <input type="password" id="confirm">
              </li>
              <li>
                <label for="path">가입경로</label>
                <select name="path" id="path">
                  <option value="blog">블로그</option>
                  <option value="search">검색</option>
                  <option value="sns">SNS</option>
                  <option value="etc">기타</option>
                </select>
              </li>
            </li>
            <li>
              <label for="memo">메모</label>
              <textarea name="memo" id="memo" cols="40" rows="10"></textarea>
            </li>
          </ul>
        </fieldset>
        <fieldset>
          <legend>이벤트와 새로운 소식</legend>
          <input type="radio" name="mail" id="mail_yes" value="yes" checked>
          <label for="mail_yes">메일 수신</label>
          <input type="radio" name="mail" id="mail_no" value="no">
          <label for="mail_no">메일 수신 안 함</label>
        </fieldset>
        <fieldset>
          <legend>이동수단</legend>
          <input type="checkbox" id="bus" name="bus">
          <label for="bus">버스</label>
          <input type="checkbox" id="metro" name="metro">
          <label for="metro">지하철</label>
          <input type="checkbox" id="walking" name="walking">
          <label for="walking">도보</label>
        </fieldset>
        <div class="buttons">
          <input type="submit" value="가입하기">
          <input type="reset" value="취소">
        </div>
      </form>
    </div>
  </body>
</html>
